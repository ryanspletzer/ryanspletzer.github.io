# Workflow to generate/update visual regression baselines on Linux
# Run this manually when you need to establish or update baseline screenshots

name: Update Visual Baselines

on:
  workflow_dispatch:
    inputs:
      commit_message:
        description: 'Commit message for baseline update'
        required: false
        default: 'Update visual regression baselines'

permissions:
  contents: write

jobs:
  update-baselines:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Need to use a token with write access to push commits
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Tags
        shell: pwsh
        run: ./.tag_generator.ps1

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true
          cache-version: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(bunx playwright --version | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bunx playwright install chromium

      - name: Install Playwright system dependencies
        run: bunx playwright install-deps chromium

      - name: Generate baseline screenshots
        run: bun --bun run test:visual:update

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push baselines
        env:
          COMMIT_MESSAGE: ${{ github.event.inputs.commit_message }}
        run: |
          git add e2e/__snapshots__/
          if git diff --staged --quiet; then
            echo "No changes to baselines"
          else
            git commit -m "$COMMIT_MESSAGE"
            git push
          fi
