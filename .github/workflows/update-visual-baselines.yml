# Workflow to generate/update visual regression baselines on Linux
# Run this manually when you need to establish or update baseline screenshots

name: Update Visual Baselines

on:
  workflow_dispatch:
    inputs:
      commit_message:
        description: 'Commit message for baseline update'
        required: false
        default: 'Update visual regression baselines'

permissions:
  contents: write

jobs:
  update-baselines:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # Credentials stay persisted: this workflow commits refreshed
        # baselines back to the branch.
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.0 # zizmor: ignore[artipacked]
        with:
          # Need to use a token with write access to push commits
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Tags
        shell: pwsh
        run: ./.tag_generator.ps1

      - name: Setup Ruby
        uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1.319.0
        with:
          ruby-version: '3.4'
          bundler-cache: true
          cache-version: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Cache bun dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(bunx playwright --version | awk '{print $2}')" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bunx playwright install chromium

      - name: Install Playwright system dependencies
        run: bunx playwright install-deps chromium

      - name: Generate baseline screenshots
        # `bun run` (not `bun --bun run`): bun is the package manager + task runner,
        # but Playwright executes on the runner's preinstalled Node, its supported runtime.
        # Forcing bun's runtime (`--bun`) makes Playwright's spec build fail
        # ("AggregateError: N errors building ...spec.ts" -> "No tests found").
        # Worked under Playwright 1.60.0 but regressed at 1.61.1; Playwright is not
        # officially supported on bun. See oven-sh/bun#8222.
        run: bun run test:visual:update

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push baselines
        env:
          COMMIT_MESSAGE: ${{ github.event.inputs.commit_message }}
        run: |
          git add e2e/__snapshots__/
          if git diff --staged --quiet; then
            echo "No changes to baselines"
          else
            git commit -m "$COMMIT_MESSAGE"
            git push
          fi
