# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# Sample workflow for building and deploying a Jekyll site to GitHub Pages
name: Deploy Jekyll site to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Run visual tests on pull requests to main
  pull_request:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Default GITHUB_TOKEN scope for all jobs: read-only. The build and
# deploy jobs override this with the Pages scopes they need, so
# PR-triggered jobs (lint, html-proofer, visual-tests) never hold
# write or OIDC permissions.
permissions:
  contents: read

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Fast lint gate: markdown, TypeScript, frontmatter contract, workflows
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Cache bun dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint Markdown
        run: bunx markdownlint-cli2

      - name: Typecheck TypeScript
        run: bun run typecheck

      - name: Check post frontmatter
        run: bun run check:frontmatter

      - name: Lint GitHub Actions workflows
        env:
          ACTIONLINT_VERSION: 1.7.12
          ACTIONLINT_SHA256: 8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8
        run: |
          curl -fsSLo actionlint.tar.gz \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          echo "${ACTIONLINT_SHA256}  actionlint.tar.gz" | sha256sum -c
          tar xzf actionlint.tar.gz actionlint
          ./actionlint -color

      - name: Audit workflow security (zizmor)
        env:
          ZIZMOR_VERSION: 1.26.1
          ZIZMOR_SHA256: 8556289a64e7aaf2400cd516f61a471aa91c5902cc56ad96a82fd12f90c2ef73
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -fsSLo zizmor.tar.gz \
            "https://github.com/zizmorcore/zizmor/releases/download/v${ZIZMOR_VERSION}/zizmor-x86_64-unknown-linux-gnu.tar.gz"
          echo "${ZIZMOR_SHA256}  zizmor.tar.gz" | sha256sum -c
          tar xzf zizmor.tar.gz zizmor
          ./zizmor .github/workflows/

  # Build the site and verify internal links, images, and scripts resolve
  html-proofer:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Generate Tags
        shell: pwsh
        run: ./.tag_generator.ps1

      - name: Setup Ruby
        uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9 # v1.316.0
        with:
          ruby-version: '3.4'
          bundler-cache: true
          cache-version: 1

      - name: Build with Jekyll
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Check internal links, images, and scripts
        run: >-
          bundle exec htmlproofer _site
          --disable-external
          --no-enforce-https
          --swap-urls 'https\://www.spletzer.com:'

  # Check which files changed to determine if visual tests are needed
  changes:
    runs-on: ubuntu-latest
    outputs:
      visual: ${{ steps.filter.outputs.visual }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            visual:
              - '_layouts/**'
              - '_includes/**'
              - '_plugins/**'
              - '_sass/**'
              - 'assets/css/**'
              - 'assets/images/**'
              - '_config.yml'
              - 'e2e/**'
              - 'playwright.config.ts'
              - 'package.json'
              - 'bun.lock'

  # Visual regression tests job
  visual-tests:
    needs: changes
    if: needs.changes.outputs.visual == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Generate Tags
        shell: pwsh
        run: ./.tag_generator.ps1

      - name: Setup Ruby
        uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9 # v1.316.0
        with:
          ruby-version: '3.4'
          bundler-cache: true
          cache-version: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Cache bun dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(bunx playwright --version | awk '{print $2}')" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bunx playwright install chromium

      - name: Install Playwright system dependencies
        run: bunx playwright install-deps chromium

      - name: Run visual regression tests
        # `bun run` (not `bun --bun run`): bun is the package manager + task runner,
        # but Playwright executes on the runner's preinstalled Node, its supported runtime.
        # Forcing bun's runtime (`--bun`) makes Playwright's spec build fail
        # ("AggregateError: N errors building ...spec.ts" -> "No tests found").
        # Worked under Playwright 1.60.0 but regressed at 1.61.1; Playwright is not
        # officially supported on bun. See oven-sh/bun#8222.
        run: bun run test:visual

      - name: Upload test artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure()
        with:
          name: visual-test-results
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  # Build job
  build:
    needs: [lint, html-proofer, changes, visual-tests]
    # Run if: (push/dispatch) AND lint and html-proofer passed AND
    # (visual-tests passed OR was skipped because no visual changes)
    if: |
      always() &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      needs.lint.result == 'success' &&
      needs.html-proofer.result == 'success' &&
      (needs.visual-tests.result == 'success' || needs.visual-tests.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Generate Tags
        shell: pwsh
        run: ./.tag_generator.ps1
      - name: Setup Ruby
        uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9 # v1.316.0
        with:
          ruby-version: '3.4' # Not needed with a .ruby-version file
          bundler-cache: true # runs 'bundle install' and caches installed gems automatically
          cache-version: 1 # Increment this number if you need to re-download cached gems
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - name: Build with Jekyll
        # Outputs to the './_site' directory by default
        run: bundle exec jekyll build --baseurl "$BASE_PATH"
        env:
          JEKYLL_ENV: production
          BASE_PATH: ${{ steps.pages.outputs.base_path }}
      - name: Upload artifact
        # Automatically uploads an artifact from the './_site' directory by default
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0

  # Deployment job
  deploy:
    needs: build
    if: always() && needs.build.result == 'success'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
