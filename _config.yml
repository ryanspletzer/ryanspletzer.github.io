    url: https://github.com/ryanspletzer
  - text: Bluesky
    url: https://bsky.app/profile/ryan.spletzer.com
  - text: LinkedIn
    url: https://www.linkedin.com/in/ryanspletzer/
  - text: Mastodon
    url: https://spletzer.com/@ryan

# Google Analytics key, leave blank to ignore
google_analytics_key: G-92E8FVFHFW

permalink: /:year/:month/:title/

plugins:
  - jekyll-redirect-from

# Enable for using pages, more details are here: http://jekyllrb.com/docs/pagination/
#paginate: 3

#highlighter: rouge

markdown: kramdown
kramdown:
