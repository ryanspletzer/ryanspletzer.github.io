<footer class="site-footer">
  <p>&copy; Ryan Spletzer 2026</p>
</footer>

<script>
  class ThemeToggle {
    #toggle;
    #mql;
    #metaDark;
    #metaLight;

    constructor() {
      this.#toggle = document.getElementById('theme-toggle');
      if (!this.#toggle) return;

      this.#mql = matchMedia('(prefers-color-scheme: light)');
      this.#metaDark = document.querySelector(
        'meta[name="theme-color"][media*="dark"]'
      );
      this.#metaLight = document.querySelector(
        'meta[name="theme-color"][media*="light"]'
      );

      this.#toggle.addEventListener('click', this);
      this.#mql.addEventListener('change', this);
      this.#sync();
      this.#toggle.classList.add('js-ready');
    }

    handleEvent(e) {
      if (e.type === 'click') {
        const next = this.#effective() === 'dark' ? 'light' : 'dark';
        const os = this.#mql.matches ? 'light' : 'dark';

        if (next === os) {
          document.documentElement.removeAttribute('data-theme');
          localStorage.removeItem('theme');
        } else {
          document.documentElement.setAttribute('data-theme', next);
          localStorage.setItem('theme', next);
        }
        this.#sync();
      } else if (e.type === 'change') {
        if (!localStorage.getItem('theme')) this.#sync();
      }
    }

    #effective() {
      return document.documentElement.getAttribute('data-theme')
        ?? (this.#mql.matches ? 'light' : 'dark');
    }

    #sync() {
      const theme = this.#effective();
      const isLight = theme === 'light';
      this.#toggle.setAttribute('aria-checked', String(isLight));
      this.#toggle.setAttribute('aria-label',
        isLight ? 'Light mode (switch to dark)' : 'Dark mode (switch to light)'
      );
      const explicit = document.documentElement.getAttribute('data-theme');
      if (explicit) {
        const c = isLight ? '#FFFFFF' : '#222222';
        this.#metaDark?.setAttribute('content', c);
        this.#metaLight?.setAttribute('content', c);
      } else {
        this.#metaDark?.setAttribute('content', '#222222');
        this.#metaLight?.setAttribute('content', '#FFFFFF');
      }
    }
  }

  new ThemeToggle();

  // Footnote hover tooltips: clone footnote content next to each <sup> reference.
  // Content is from the page's own kramdown-rendered footnotes (same-origin, not user input).
  // CSS handles visibility on hover / focus-within; Escape dismissal per WCAG 1.4.13.
  class FootnoteTooltips {
    #tips;

    constructor() {
      const refs = document.querySelectorAll('sup[id^="fnref:"] a.footnote');
      if (!refs.length) return;

      this.#tips = [];
      refs.forEach(ref => {
        const id = ref.getAttribute('href')?.replace('#', '');
        const source = id && document.getElementById(id);
        if (!source) return;
        const tip = document.createElement('span');
        tip.className = 'footnote-tooltip';
        tip.setAttribute('aria-hidden', 'true');
        Array.from(source.childNodes).forEach(n => tip.appendChild(n.cloneNode(true)));
        ref.closest('sup').appendChild(tip);
        this.#tips.push(tip);
      });

      this.#positionAll();
      visualViewport.addEventListener('resize', this);
      document.addEventListener('keydown', this);
    }

    handleEvent(e) {
      if (e.type === 'resize') {
        this.#positionAll();
      } else if (e.key === 'Escape') {
        const tip = document.activeElement?.closest('sup')?.querySelector('.footnote-tooltip');
        if (!tip) return;
        tip.classList.add('is-dismissed');
        document.activeElement.addEventListener(
          'blur', () => tip.classList.remove('is-dismissed'), { once: true }
        );
      }
    }

    #positionAll() {
      const vw = document.documentElement.clientWidth;
      for (const tip of this.#tips) {
        tip.classList.remove('flip-inline');
        if (tip.getBoundingClientRect().right > vw) tip.classList.add('flip-inline');
      }
    }
  }

  new FootnoteTooltips();
</script>
